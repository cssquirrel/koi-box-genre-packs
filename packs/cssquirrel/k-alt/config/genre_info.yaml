      description: >
        Maximum aggression Korean nu-metal. The hardest, screamiest end
        of the Linkin Park spectrum — Given Up, One Step Closer, A Place
        for My Head energy. Relentless screamed vocals, rapid-fire rap
        verses, crushing breakdowns, minimal clean singing. Industrial
        electronic elements layered over wall-of-sound distorted guitars.
        Pure catharsis through sonic violence.
