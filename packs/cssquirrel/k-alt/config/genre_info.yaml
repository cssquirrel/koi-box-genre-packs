        IMAGERY: Cracked walls, falling, drowning, fire, clenched fists,
        shattered glass, chains, scars, storm.
        RAP LINES should be dense, rhythmic, rapid-fire — short punchy
        syllables that hit hard.
        SUNG LINES should be more open and emotional — sustained vowels.
