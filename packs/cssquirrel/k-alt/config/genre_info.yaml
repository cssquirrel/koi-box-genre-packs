    bite-back:
      description: >
        Gritty female Korean rap-rock with swagger. Heavy trap-influenced
        808s and distorted bass meet crunchy guitar loops and industrial
        samples. Dominant rap delivery with punchy sung hooks — Lisa from
        BLACKPINK's confident flow meets Rage Against the Machine's
        groove-heavy aggression. Lower BPM for head-nodding swagger
        rather than speed. Unapologetic, confrontational, stylish.
