        screamed vocals, gothic synth, dark atmospheric pads, heavy
        breakdown, double kick drums, pounding drums, distorted bass,
        orchestral hits, dark, intense, heavy, raw, emotional, dramatic
      dynamic_lyrics: true
      lyrics_guidance: >-
