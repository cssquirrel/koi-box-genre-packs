        of deep pain. Gothic intensity with moments of ethereal beauty.
        THEMES: Betrayal, wrath, grief transformed into fury, haunted
        strength, rising from ruins, vengeance, dark resolve.
        IMAGERY: Shattered glass, war paint, ash and smoke, thorns,
        black water, iron, blood on marble, eclipse.
        VERSE LINES: haunted, controlled, simmering — like a warning.
        CHORUS LINES: explosive belting — powerful sustained vowels
        that a female vocalist can scream or soar on.
        BRIDGE LINES: fragile, ghostly, whispered.
