        swagger, groove, head-nodding, punchy, raw, attitude
      dynamic_lyrics: true
      lyrics_guidance: >-
        MOOD: Confident, swaggering, dangerous. Not screaming — controlled
        aggression with a smirk. The calm before she destroys you.
        THEMES: Dominance, dismissal, flexing, taking what's hers,
        shutting people down, unbothered power, street attitude.
        IMAGERY: Heels on throats, crowns, thrones, venom, money,
        designer armor, walking away from explosions, microphone as weapon.
        RAP LINES: dense, rhythmic, flowing — confident delivery not
        machine-gun speed. Swagger over velocity.
        HOOK LINES: short, catchy, singable — earworm attitude.
        RAP2/RAP3 LINES: escalating intensity, more bite each verse.
