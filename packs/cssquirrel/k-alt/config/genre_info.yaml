    glass-war:
      description: >
        Female-fronted Korean industrial alt-metal. Powerful belting
        and aggressive female vocals over crushing drop-tuned guitars,
        industrial percussion, gothic synth textures, and heavier
        breakdowns. Evanescence meets Linkin Park — soaring vocal
        beauty against grinding sonic brutality. Darker, weightier,
        and more atmospheric than Lee Park.
